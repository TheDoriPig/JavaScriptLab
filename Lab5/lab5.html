<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
        <style>
            body {
                margin: 0;
                padding: 20px 0;
                background-color: #f5f5f5;
                font-family: Arial, sans-serif;
            }
            .grid-container {
                display: grid;
                width: 800px;
                margin: 0 auto;
                grid-template-rows: auto 1fr auto; 
                grid-template-columns: 200px 1fr;   
                grid-template-areas: 
                    "header header"
                    "menu   info"
                    "footer footer";
                min-height: 90vh;
                gap: 10px;
            }

            .header { grid-area: header; }
            .menu   { grid-area: menu; }
            .info   { grid-area: info; }
            .footer { grid-area: footer; }

            .grid-container > * {
                background-color: #fff;
                border: 2px solid #000;
                padding: 15px;
                box-sizing: border-box;
            }
            .header {
                display: flex;
                align-items: center;
                gap: 20px;
            }
            .header .logo {
                width: 50px;
                height: 50px;
                object-fit: contain;
            }
            .header h1 {
                margin: 0;
                font-size: 24px;
            }
            .menu {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .menu a {
                text-decoration: none;
                color: #333;
                padding: 8px;
                border: 1px solid #ccc;
                background: #eee;
                text-align: center;
            }
            .menu a:hover {
                background: #ddd;
            }
            .footer {
                text-align: center;
                font-size: 14px;
                color: #555;
            }
            .footer p {
                margin: 5px 0;
            }
        </style>
    </head>
    <body>
        <div class="grid-container">
            <header class="header">
                <img src="viz.png" alt="Логотип" class="logo">
                <h1>Лаболаторная работа 5</h1>
            </header>
            <nav class="menu">
                <a onclick="runTask1()">Задание 1</a>
                <a onclick="runTask2()">Задание 2</a>
                <a onclick="">Задание 3</a>
            </nav>
            <main class="info" id="info-block">
                <h2>Информационная часть</h2>
                <p>Здесь располагается все основное содержимое страницы.</p>
            </main>
            <footer class="footer">
                <p>Пашковский Андрей Геннадьевич | Группа: ЗИТ-11</p>
                <p>Дата создания: 2026г. | Email: pashkovskiy2003@gmail.com</p>
            </footer>
        </div>
        <script>
            function Result(x, y, z) {
                // Приводим строки из prompt к числам через Float
                let nx = parseFloat(x);
                let ny = parseFloat(y);
                let nz = parseFloat(z);
                
                let result = (Math.log10(Math.sqrt(nx) + Math.sqrt(ny) + 2)) / Math.abs(2 * nz);
                return { value: result };
            }

            function runTask1() {
                // 1. Запрашиваем данные у пользователя
                let rx = prompt("Введите значение x", "");
                let ry = prompt("Введите значение y", "");
                let rz = prompt("Введите значение z", "");

                // 2. Считаем результат
                let b = Result(rx, ry, rz);

                // 3. Находим блок info
                const infoBlock = document.getElementById('info-block');

                // 4. Формируем HTML-контент и вставляем его внутрь блока info
                infoBlock.innerHTML = `
                    <h3>Разработчик скрипта: Пашковский Андрей Геннадьевич</h3>
                    <p>Значение x = ${rx}</p>
                    <p>Значение y = ${ry}</p>
                    <p>Значение z = ${rz}</p>
                    <h4>Результат вычисления: b = ${b.value}</h4>
                `;
            }
        </script>
        <script>
            function Result(x, y, z) {
                let nx = parseFloat(x);
                let ny = parseFloat(y);
                let nz = parseFloat(z);
                
                let result = (Math.log10(Math.sqrt(nx) + Math.sqrt(ny) + 2)) / Math.abs(2 * nz);
                return { value: result };
            }

            function runTask2() {
                // 1. Запрашиваем данные у пользователя
                let rx = prompt("Введите значение x", "4");
                let ry = prompt("Введите значение y", "9");
                let rz = prompt("Введите значение z", "2");

                if (rx === null || ry === null || rz === null) return;

                // 2. Считаем результат
                let b = Result(rx, ry, rz);

                // 3. Открываем новое пустое окно браузера
                let newWindow = window.open("", "_blank");

                // 4. Записываем чистый HTML со стандартными тегами без стилей
                newWindow.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <meta charset="UTF-8">
                        <title>Результаты вычислений</title>
                    </head>
                    <body>
                        <h1>Отчет о выполнении вычислений</h1>
                        <h3>Разработчик скрипта: Пашковский Андрей Геннадьевич</h3>
                        
                        <p><strong>Исходные данные:</strong></p>
                        <ul>
                            <li>Значение x = ${rx}</li>
                            <li>Значение y = ${ry}</li>
                            <li>Значение z = ${rz}</li>
                        </ul>

                        <p><strong>Результат вычисления:</strong></p>
                        <p>b = ${b.value}</p>

                        <br>
                        <button onclick="window.close()">Закрыть страницу</button>
                    </body>
                    </html>
                `);
                
                // Закрываем поток записи
                newWindow.document.close();
            }
        </script>
    </body>
</html>
