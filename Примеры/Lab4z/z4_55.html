<script>

    str = "Мой телефонный номер: " + "33-22-44. Номер моего редактора: " + "222-44-55 и 323-22-33<br>";
    document.write("Исходная строка<br>");

    pattern = /[0-9]{3}-\d{2}-\d{2}/g;
    //вывод результатов поиска
    document.write(str.match(pattern), "<br>");

    //Проверка E-mail

    pattern = /^[A-Za-z][A-z0-9-]*@([A-Za-z0-9][A-z0-9-]*\.)+[A-Za-z]{2,}$/;

    { document.write("OK"); }

    { document.write("Bad"); }
</script>
