<script>
    /*Использование квантификаторов. Квантификатор - это конструкция позволяющая задать сколько раз предшествующий ей символ или группа символов должна встречаться в совпадение.*/
    //Зададим регулярное выражение rv1
    rv1 = /ко{5}шка/g
    //Зададим регулярное выражение rv2
    rv2 = /ко{3,}шка/g
    //Зададим регулярное выражение rv3
    rv3 = /ко+шка/g
    //Зададим регулярное выражение rv4
    rv4 = /ко?шка/g
    //Зададим регулярное выражение rv5
    rv5 = /ко*шка/g
    txt1 = ' кшка кошка коошка кооошка коооошка кооооошка коооооошка кооооооошка';
    //Произведем с помощью регулярного выражения rv поиск по строке txt1
    document.write(txt1.match(rv1) + '<br />');
    document.write(txt1.match(rv2) + '<br />');
    document.write(txt1.match(rv3) + '<br />');
    document.write(txt1.match(rv4) + '<br />');
    document.write(txt1.match(rv5) + '<br />');
</script>
