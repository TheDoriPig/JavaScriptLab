<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
    </head>
    <body>
        <h2>В соответствии с вариантом необходимо написать скрипт для вычисления значения переменной b. <img src="t2-1.png"></h2>
        <h3>Разработчик скрипта: Пашковский Андрей Геннадьевич</h3>
        <script>
            let x = prompt("Введите значение x", "");
            let y = prompt("Введите значение y", "");
            let z = prompt("Введите значение z", "");
            let b = (Math.log10(Math.sqrt(x) + Math.sqrt(y) + 2)) / Math.abs(2 * z);
            document.write("Значение x = ", x, "<br>");
            document.write("Значение y = ", y, "<br>");
            document.write("Значение z = ", z, "<br>");
            document.write("Результат вычесления: b = ", b);
        </script>
    </body>
</html>
