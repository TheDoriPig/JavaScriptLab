<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
        <script>
            var lang = prompt("Введите «ru», «en», «fr» или «de» для выбора языка", "");
            switch(lang) {
                case "ru": alert("Выбранный язык русский"); break;
                case "en": alert("Выбранный язык английский"); break;
                case "fr": alert("Выбранный язык французский"); break;
                case "de": alert("Выбранный язык немецкий"); break;
                default: alert("Язык неизвестен");
            }
        </script>
    </head>
    <body></body>
</html>
