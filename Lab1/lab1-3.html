<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
        <script>
            var lang = prompt("Введите «ru», «en», «fr» или «de» для выбора языка", "");
            if (lang == "ru") {
                alert("Выбранный язык русский");
            }
            else if (lang == "en") {
                alert("Выбранный язык английский");
            }
            else if (lang == "fr") {
                alert("Выбранный язык французский");
            }
            else if (lang == "de") {
                alert("Выбранный язык немецкий");
            }
            else {
                alert("Язык неизвестен");
            }
        </script>
    </head>
    <body></body>
</html>
