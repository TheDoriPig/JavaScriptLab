<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
    </head>
    <body>
        <h2>В соответствии со своим вариантом необходимо написать Java-скрипт для вычисления значения функции y.<img src="lab1-5.png"></h2>
        <h3>Разработчик скрипта: Пашковский Андрей Геннадьевич</h3>
        <script>
            let x = prompt("Введите значение x: ", "");
            if (x >= 8 && x != 10) {
                y = Math.sqrt(x + 1);
            }
            else if (x > 0 && x < 8) {
                y = 0.6 * x;
            }
            else {
                y = Math.log10(x) + 3;
            }
            document.write("<h3>Значение x = ", x, "<br>Итоговое значение y = ", y, "</h3>");
        </script>
    </body>
</html>
