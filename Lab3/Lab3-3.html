<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
        <style>
            .canvas {
                position: relative;
                width: 400px;
                height: 350px;
                margin: 20px 0;
            }
            .box {
                position: absolute;
                width: 150px;
                height: 150px;
                color: white;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            #block1 {
                background-color: orange;
                top: 30px;
                left: 30px;
            }
            #block2 {
                background-color: darkred;
                top: 80px;
                left: 100px;
            }
            #block3 {
                background-color: green;
                top: 130px;
                left: 170px;
            }
        </style>
    </head>
    <body>
        <h2>Управление слоями (z-index)</h2>
        <div>
            <button onclick="rotateLayers()">Сдвинуть слои (Поменять z-index)</button>
        </div>
        <div class="canvas">
            <div id="block1" class="box"><span id="z1" class="badge">z-index: 1</span></div>
            <div id="block2" class="box"><span id="z2" class="badge">z-index: 2</span></div>
            <div id="block3" class="box"><span id="z3" class="badge">z-index: 3</span></div>
        </div>
    <script>
        let zIndices = [1, 2, 3];

        function updateDOM() {
            document.getElementById('block1').style.zIndex = zIndices[0];
            document.getElementById('block2').style.zIndex = zIndices[1];
            document.getElementById('block3').style.zIndex = zIndices[2];
            document.getElementById('z1').innerText = "z-index: " + zIndices[0];
            document.getElementById('z2').innerText = "z-index: " + zIndices[1];
            document.getElementById('z3').innerText = "z-index: " + zIndices[2];
        }
        function rotateLayers() {
            let last = zIndices.pop();
            zIndices.unshift(last);
            updateDOM();
        }
        updateDOM();
    </script>
    </body>
</html>
