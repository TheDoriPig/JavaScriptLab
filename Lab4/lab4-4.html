<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
    </head>
    <body>
        <script>
            function shuffleWord(word) {
                if (word.length < 4) return word;

                let first = word[0];
                let last = word[word.length - 1];
                
                let middle = word.substring(1, word.length - 1).split('');

                for (let i = middle.length - 1; i > 0; i--) {
                    let j = Math.floor(Math.random() * (i + 1));
                    let temp = middle[i];
                    middle[i] = middle[j];
                    middle[j] = temp;
                }

                return first + middle.join('') + last;
            }

            function processText(text) {
                return text.replace(/[a-zA-Zа-яА-ЯёЁ]+/g, function(match) {
                    return shuffleWord(match);
                });
            }

            let message = "Я сходил в магазин и купил продуктов на целую неделю вперед";
            let result = processText(message);

            document.write("Исходный текст:<br>", message, "<br><br>");
            document.write("Обработанный текст:<br>", result);
        </script>
    </body>
</html>
