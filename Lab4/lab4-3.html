<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Пашковский Андрей</title>
    </head>
    <body>
        <script>
            function encrypt(text) {
                let result = "";
                
                for (let i = 0; i < text.length; i++) {
                    let char = text[i];
                    if (char >= 'а' && char <= 'я') {
                        if (char === 'я') {
                            result += 'a';
                        } else {
                            result += String.fromCharCode(char.charCodeAt(0) + 1);
                        }
                    } 
                    else if (char >= 'А' && char <= 'Я') {
                        if (char === 'Я') {
                            result += 'А';
                        } else {
                            result += String.fromCharCode(char.charCodeAt(0) + 1);
                        }
                    } 
                    else {
                        result += char;
                    }
                }
                return result;
            }

            let message = "Я сходил в магазин и купил продуктов на целую неделю вперед";
            let encryptedMessage = encrypt(message);

            document.write("Исходный текст: ", message, "<br>");
            document.write("Зашифрованный текст: ", encryptedMessage);
        </script>
    </body>
</html>
